<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Wheel App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <header>
        <div class="header-content">
            <div class="user-badge"><span id="user-display-name">Игрок</span></div>
            <div class="balance-badge"><span id="balance">0</span> 🪙</div>
        </div>
    </header>
    <main id="app-container">
        <section id="login-page" class="page active">
            <div class="card">
                <h2>Вход</h2>
                <input type="text" id="username-input" placeholder="Никнейм">
                <input type="password" id="password-input" placeholder="Пароль">
                <button class="btn-primary" onclick="login()">Войти</button>
            </div>
        </section>
        <section id="wheel-page" class="page">
            <div class="wheel-area">
                <div class="wheel-pointer"></div>
                <div id="wheel-canvas-container"></div>
            </div>
            <div class="wheel-controls">
                <p>Спины: <strong id="spins">0</strong></p>
                <button id="spin-btn" class="btn-spin" onclick="spin()">КРУТИТЬ</button>
            </div>
        </section>
        <section id="shop-page" class="page">
            <h2 class="page-title">Магазин</h2>
            <div id="shop-items-list" class="shop-grid"></div>
            <h2 class="page-title">Инвентарь</h2>
            <div id="inventory-list"></div>
        </section>
        <section id="admin-page" class="page">
            <h2>Админка</h2>
            <div class="card">
                <input type="text" id="admin-target-nick" placeholder="Ник игрока">
                <input type="number" id="admin-amount" placeholder="Сумма">
                <button onclick="adminAdjustBalance()">Применить</button>
                <button onclick="adminGiveSpin()">+1 Спин</button>
                <p id="admin-status"></p>
            </div>
            <h3>Заказы</h3>
            <div id="admin-orders-list"></div>
        </section>
    </main>
    <nav id="main-nav" class="bottom-nav" style="display:none;">
        <button onclick="show('wheel-page')">🎡</button>
        <button onclick="show('shop-page')">🛍️</button>
        <button onclick="checkAdmin()">🔐</button>
        <button onclick="logout()">🚪</button>
    </nav>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
